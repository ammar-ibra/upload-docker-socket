version: "3.9"

services:
  api:
    build: .
    container_name: node_api
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/yourdb

    depends_on:
      - mongo

    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: